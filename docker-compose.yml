version: "3.9"

services:
  app:
    build: ./docker/php
    container_name: ibridge_app
    volumes:
      - ./backend:/var/www
    ports:
      - "8000:8000"
    depends_on:
      - mysql

  mysql:
    image: mysql:8
    container_name: ibridge_mysql
    restart: always
    environment:
      MYSQL_DATABASE: ibridge
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: user
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata: